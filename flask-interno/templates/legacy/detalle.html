<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Autoparte</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div id="contenido-detalle" class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        </div>

    <script>
        // Mismo inventario (Normalmente vendría de una DB o archivo JSON compartido)
        const inventario = [
            {id: 1, nombre: "Pastillas de freno cerámicas", precio: 89.99, img: "https://via.placeholder.com/150", sku: "BRK-001"},
            {id: 2, nombre: "Turbo compresor GT35-R", precio: 1200.00, img: "https://via.placeholder.com/150", sku: "TRB-035"},
            {id: 3, nombre: "Amortiguador Gas-Adjust", precio: 150.00, img: "https://via.placeholder.com/150", sku: "SHK-102"},
            {id: 4, nombre: "Kit de Emgrague (Clutch)", precio: 25.99, img: "https://via.placeholder.com/150", sku: "CLU-550"},
            {id: 5, nombre: "Bomba de agua Eléctrica", precio: 15.99, img: "https://via.placeholder.com/150", sku: "WTR-992"},
            {id: 6, nombre: "Radiador de Aluminio", precio: 12.99, img: "https://via.placeholder.com/150", sku: "RAD-202"},
            {id: 7, nombre: "Alternador 140 Amp", precio: 200.00, img: "https://via.placeholder.com/150", sku: "ALT-440"},
            {id: 8, nombre: "Filtro de Aire Alto Flujo", precio: 89.99, img: "https://via.placeholder.com/150", sku: "AIR-007"},
            {id: 9, nombre: "Brujías de Iridio (Set 4)", precio: 199.99, img: "https://via.placeholder.com/150", sku: "BAT-12V"},
            {id: 10, nombre: "Banda de Distribución", precio: 25.99, img: "https://via.placeholder.com/150", sku: "LED-001"},
            {id: 11, nombre: "Sensor de Oxígeno O2", precio: 15.99, img: "https://via.placeholder.com/150", sku: "CBL-001"},
            {id: 12, nombre: "Inyecciones de 550cc", precio: 45, img: "https://via.placerholder.com/150", sku: "SEN-001"},
            {id: 13, nombre: "Disco de Freno Hi-Carbon", precio: 89.99, img: "https://via.placeholder.com/150", sku: "TUB-001"},
            {id: 14, nombre: "Cuerpo de aceleración", precio: 120.00, img: "https://via.placeholder.com/150", sku: "SUP-001"},
            {id: 15, nombre: "Bobinas de Encendido Red", precio: 25.99, img: "https://via.placeholder.com/150", sku: "BEL-001"},
            {id: 16, nombre: "Múltiple de Admisión", precio: 15.99, img: "https://via.placeholder.com/150", sku: "FUE-001"},
            {id: 17, nombre: "Intercooler Frontal", precio: 12.99, img: "https://via.placeholder.com/150", sku: "RAD-202"},
            {id: 18, nombre: "Válvula de Alivio (Bov)", precio: 200.00, img: "https://via.placeholder.com/150", sku: "ALT-440"},
            {id: 19, nombre: "Soporte Motor Reforzado", precio: 89.99, img: "https://via.placeholder.com/150", sku: "AIR-007"},
            {id: 20, nombre: "Batería AGM Pro", precio: 199.99, img: "https://via.placeholder.com/150", sku: "BAT-12V"}
        ];
        // Nota: Para las otras 18 piezas, la lógica buscará por ID.

        const params = new URLSearchParams(window.location.search);
        const id = parseInt(params.get('id'));
        const p = inventario.find(item => item.id === id) || inventario[0]; //Fallback al primer item si no es encontrado

        document.getElementById('contenido-detalle').innerHTML = `
            <div class="bg-blue-600 text-white p-4 font-bold text-lg">Detalle de Autoparte</div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 p-8">
                <div>
                    <div class="border rounded-lg p-6 mb-4 flex justify-center"><img src="${p.img}" class="h-64 object-contain"></div>
                    <div class="flex space-x-2">
                        <div class="border p-1 border-blue-500 p-1 rounded w-20 h-20 bg-gray-50"></div>
                        <div class="border p-1 border-blue-500 p-1 rounded w-20 h-20 bg-gray-50"></div>
                        <img src="${p.img}" alt="${p.nombre}" class="h-48 object-contain">
                    </div>
                </div>
            </div>
            <div>
                <span class="bg-green-500 text-white px-2 py-1 rounded text-xs font-bold uppercase">Disponible</span>
                <h1 class="text-3xl font-bold text-blue-900 mt-2">${p.nombre}</h1>
                <p class="text-gray-500 text-sm mb-4 uppercase">SKU: ${p.sku}</p>
                <p class="text-gray-600 mb-6 text-sm">Componente certificado bajo estándares OEM para garantizar el rendimiento óptimo de su vehículo.</p>

                <h3 class="font-bold mb-2">Compatibilidad</h3>
                <table class="w-full text-left text-xs border-collapse border">
                    <thetad><tr class="bg-gray-100"><th class="p-2 border">Modelo</th><th class="p-2 border">Año</th><th class="p-2 border">Motor</th></tr></thead>
                    <tbody>${p.comp ? p.comp.map(c => `<tr><td class="p-2 border">${c.m}</td><td class="p-2 border">${c.a}</td><td class="p-2 border">${c.mo}</td></tr>`).join('') : `<tr><td colspan="3" class="p-2 border">Cualquier modelo estándar</td></tr>`}</tbody>
                </table>
                <a href="pedido.html?id-=${p.id}" class="block w-full bg-blue-600 text-white text-center font-bold py-3 rounded-lg mt-8 hover:bg-blue-700 shadow-md">Realizar Pedido</a>
            </div>
           </div>
        `;
    </script>
</body>
</html>
