{% extends "layout.html" %}

{% block content %}

<style>
    .titulo-seccion {
        font-weight: 700;
        margin-bottom: 25px;
        color: #2c3e50;
    }

    .tabla-pedidos table {
        width: 100%;
        border-collapse: collapse;
    }

    .tabla-pedidos thead {
        background-color: #1F3A5F;
        color: white;
    }

    .tabla-pedidos th,
    .tabla-pedidos td {
        padding: 14px;
        text-align: center;
        border-bottom: 1px solid var(--accent);
        border-right: 1px solid #ffffff30;
    }

    .tabla-pedidos th:last-child,
    .tabla-pedidos td:last-child {
        border-right: none;
    }

    .tabla-pedidos tbody tr:hover {
        background-color: #f4f6f7;
    }

    .badge-estado {
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        color: white;
    }

    .pendiente { background: #f39c12; }
    .enviado { background: #3498db; }
    .cancelado { background: #e74c3c; }

    .btn-ver {
        background-color: #f1c40f;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: black;
        text-decoration: none;
    }

    .btn-ver:hover {
        background-color: #d4ac0d;
        color: black;
    }
</style>

<div class="container-fluid">

    <h2 class="titulo-seccion">Listado de Pedidos</h2>

    <div class="card">

        <div class="tabla-pedidos">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Detalle</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>101</td>
                        <td>Juan Pérez</td>
                        <td>01/03/2026</td>
                        <td>$3,500</td>
                        <td><span class="badge-estado pendiente">Pendiente</span></td>
                        <td>
                            <a href="{{ url_for('pedido_detalle', pedido_id=101) }}" class="btn-ver">
                                Ver
                            </a>
                        </td>
                    </tr>
                    <tr>
                        <td>102</td>
                        <td>María López</td>
                        <td>02/03/2026</td>
                        <td>$1,200</td>
                        <td><span class="badge-estado enviado">Enviado</span></td>
                        <td>
                            <a href="{{ url_for('pedido_detalle', pedido_id=102) }}" class="btn-ver">
                                Ver
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

{% endblock %}
