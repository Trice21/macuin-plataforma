<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso interno — MACUIN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1F3A5F;
            --secondary: #4A6FA5;
            --error: #E53935;
            --bg: #F4F6F8;
            --card: #FFFFFF;
            --text-primary: #333333;
            --text-secondary: #666666;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: var(--card);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(31, 58, 95, 0.08), 0 1px 3px rgba(0, 0, 0, 0.04);
            padding: 2.5rem 2rem;
            border: 1px solid rgba(31, 58, 95, 0.06);
        }
        .login-logo {
            display: block;
            margin: 0 auto 1.5rem;
            height: 40px;
            width: auto;
            object-fit: contain;
        }
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 0.35rem;
        }
        .login-subtitle {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.4rem;
        }
        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 1rem;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-primary);
            background: var(--card);
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.12);
        }
        .form-input.error { border-color: var(--error); }
        .form-input.error:focus { box-shadow: 0 0 0 3px rgba(229, 57, 53, 0.12); }
        .form-error {
            font-size: 0.8125rem;
            color: var(--error);
            margin-top: 0.35rem;
        }
        .btn-primary {
            width: 100%;
            height: 48px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: filter 0.2s;
            margin-top: 0.25rem;
        }
        .btn-primary:hover { filter: brightness(1.08); }
        .login-footer {
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.8125rem;
            color: var(--text-secondary);
        }
        .login-footer svg { width: 1rem; height: 1rem; color: var(--secondary); flex-shrink: 0; }
        @media (max-width: 480px) {
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='images/logo_macuin.png') }}" alt="MACUIN" class="login-logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div style="display:none; font-size:1.25rem; font-weight:700; color: var(--primary); text-align:center; margin-bottom:1.5rem;">MACUIN</div>

        <h1 class="login-title">Acceso interno</h1>
        <p class="login-subtitle">Panel de gestión Interna</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="form-error" style="margin-bottom:1rem;">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}" autocomplete="on">
            <div class="form-group">
                <label for="username">Usuario / Correo</label>
                <input type="text" name="username" id="username" class="form-input" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" name="password" id="password" class="form-input" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-primary">Ingresar</button>
        </form>

        <p class="login-footer">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            Acceso exclusivo para personal autorizado
        </p>
    </div>
</body>
</html>
