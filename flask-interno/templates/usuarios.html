{% extends "layout.html" %}

{% block content %}

<style>
    .titulo-seccion {
        font-weight: 700;
        margin-bottom: 25px;
        color: #2c3e50;
    }

    .btn-nuevo {
        background-color: #f1c40f;
        color: black;
        font-weight: 600;
        border-radius: 8px;
        padding: 8px 18px;
        border: none;
        margin-bottom: 20px;
    }

    .btn-nuevo:hover {
        background-color: #d4ac0d;
    }

    .tabla-usuarios thead {
        background-color: #2c3e50;
        color: white;
    }

    .tabla-usuarios th, .tabla-usuarios td {
        padding: 14px;
        text-align: center;
    }

    .tabla-usuarios tbody tr:hover {
        background-color: #f4f6f7;
    }

    .badge-activo {
        background-color: #2ecc71;
        padding: 6px 10px;
        border-radius: 20px;
        color: white;
        font-size: 12px;
        font-weight: 600;
    }

    .btn-editar {
        background-color: #f1c40f;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: black;
        margin-right: 6px;
    }

    .btn-eliminar {
        background-color: #e74c3c;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: white;
    }
</style>

<div class="container-fluid">

    <h2 class="titulo-seccion">Gestión de Usuarios</h2>

    <button class="btn-nuevo">+ Nuevo Usuario</button>

    <div class="tabla-usuarios shadow-sm">
        <table class="table mb-0">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Ana López</td>
                    <td>alopez</td>
                    <td>Administrador</td>
                    <td><span class="badge-activo">Activo</span></td>
                    <td>
                        <button class="btn-editar">Editar</button>
                        <button class="btn-eliminar">Desactivar</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

{% endblock %}
