<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedido Realizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        <div class="bg-blue-600 text-white p-4 font-bold text-lg">Crear pedido </div>

        <div class="flex items-center justify-center py-8">
            <div class="flex items-center text-blue-600">
                <div class="rounded-full border-2 border-blue-600 w-8 h-8 flex items-center justify-center font-bold">1</div>div>
                <div class="w-16 h-1 bg-blue-600"></div>
                <div class="rounded-full bg-blue-600 text-white w-8 h-8 flex items-center justify-center font-bold">2</div>
                <div class="rounded-full border-2 border-gray-300 w-8 h-8 flex items-center justify-center font-bold text-gray-400">3</div>
            </div>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 p8">
            <div id="resumen-pedido" class="bg-gray-50 p-4 rounded-xl border-2 border-dashed border-blue-200">
                </div>

            <div class="md:col-span-2 grid grid-cols-2 gap-4">
                <div class="md:col-span-2 grid grid-cols-2 gap-4">
                    <div class="col-span-1 border-b pb-1"><label class="text-xs text-gray-400 block">Nombre</label> <input type="text" class="w-full border-none"></div>
                    <div class="col-span-1 border-b pb-1"><label class="text-xs text-gray-400 block">Apellido</label><input type="text" class="w-full outline-none"></div>
                    <div class="col-span-2 border-b pb-1"><label class="text-xs text-gray-400 block">Dirección</label><input type="text" class="w-full outline-none"></div>
                    <div class="col-span-1 border-b pb-1"><label class="text-xs text-gray-400 block">Email</label><input type="email" class="w-full outline-none"></div>
                    <div class="col-span-1 border-b pb-1"><label class="text-xs text-gray-400 block">Teléfono</label><input type="text" class="w-full outline-none"></div>

                    <div class="col-span-2 text-center mt-6">
                        <button class="bg-blue-700 text-white px-12 py-3 rounded-lg font-bold hover:bg-800 transition shadow-lg uppercase">Confirmar Pedido</button>
                        <p class="mt-4 text-red-500 cursor-pointer text-sm font-bold">Cancelar Pedido</p>
                    </div>
                </div>
            </div>
            <div class="bg-yellow-100 p-3 m-8 rounded flex items-center text-sm"><span class="mr-2">⚠️</span></b>Entrega estimada en 48 hrs</div>
            </div>

            <script>
                //Mismo inventario simplificado para el precio
                const inventario = [
                    {id: 1, nombre: "Pastillas de freno cerámicas", precio: 89.99},
                    {id: 2, nombre: "Turbo compresor GT35-R", precio: 1200.00},
                    {id: 3, nombre: "Amortiguador Gas-Adjust", precio: 150.00},
                    {id: 4, nombre: "Kit de Emgrague", precio: 25.99},
                    {id: 5, nombre: "Bomba de agua Eléctrica", precio: 15.99},
                    {id: 6, nombre: "Radiador de Aluminio", precio: 12.99},
                    {id: 7, nombre: "Alternador 140 Amperes", precio: 200.00},
                    {id: 8, nombre: "Filtro de Aire Alto Flujo", precio: 89.99},
                    {id: 9, nombre: "Brujías de Iridio (Set 4)", precio: 199.99},
                    {id: 10, nombre: "Banda de Distribución", precio: 25.99},
                    {id: 11, nombre: "Sensor de Oxígeno O2", precio: 15.99},
                    {id: 12, nombre: "Inyecciones de 550cc", precio: 45.99},
                    {id: 13, nombre: "Disco de Freno Hi-Carbon", precio: 89.99},
                    {id: 14, nombre: "Cuerpo de aceleración", precio: 120.00},
                    {id: 15, nombre: "Bobinas de Encendido Red", precio: 25.99},
                    {id: 16, nombre: "Múltiple de Admisión", precio : 15.99},
                    {id: 17, nombre: "Intercooler Frontal", precio: 12.99},
                    {id: 18, nombre: "Válvula de Alivio (Bov)", precio: 200.00},
                    {id: 19, nombre: "Soporte Motor Reforzado", precio: 89.99},
                    {id: 20, nombre: "Batería AGM Pro", precio: 199.99},
                ];

                const id = parseInt(new URLSearchParams(window.location.search).get('id'));
                const p = inventario.find(item => item.id === id) || {nombre: "Autoparte Genérica", precio: 0};

                document.getElementById('resumen-pedido').innerHTML = `
                    <h4 class="font-bold text-gray-700 mb-4">Resumen del Carrito</h4>
                    <p class="text-sm text-gray-600">${p.nombre}x1</p>
                    <div class="mt-4 border-t pt-4">
                        <p class="text-xs text-gray-400 uppercase">Total:</p>
                        <p class="text-3xl font-bold text-blue-700">$${p.precio.toFixed(2)}</p>
                    </div>
                    <div class="flex space-x-2 mt-6">
                        <button class="border px-4 py-1 rounded text-xs hover:bg-gray-100">Editar</button>
                        <button class="bg-blue-600 text-white px-4 py-1 rounded text-xs hover:bg-blue-700">Añadir</button>
                    </div>
                `;

            </script>
</body>
</html>
