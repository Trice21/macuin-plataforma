{% extends "layout.html" %}

{% block content %}

<style>
    .titulo-seccion {
        font-weight: 700;
        margin-bottom: 25px;
        color: #2c3e50;
    }

    .btn-nuevo {
        background-color: #f1c40f;
        color: black;
        font-weight: 600;
        border-radius: 8px;
        padding: 8px 18px;
        border: none;
        margin-bottom: 20px;
    }

    .btn-nuevo:hover {
        background-color: #d4ac0d;
    }

    .tabla-usuarios table {
        width: 100%;
        border-collapse: collapse;
    }

    .tabla-usuarios thead {
        background-color: #1F3A5F;
        color: white;
    }

    .tabla-usuarios th,
    .tabla-usuarios td {
        padding: 14px;
        text-align: center;
        border-bottom: 1px solid var(--accent);
        border-right: 1px solid #ffffff30;
    }

    .tabla-usuarios th:last-child,
    .tabla-usuarios td:last-child {
        border-right: none;
    }

    .tabla-usuarios tbody tr:hover {
        background-color: #f4f6f7;
    }

    .badge-activo {
        background-color: #2ecc71;
        padding: 6px 10px;
        border-radius: 20px;
        color: white;
        font-size: 12px;
        font-weight: 600;
    }

    .btn-editar {
        background-color: #f1c40f;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: black;
        margin-right: 6px;
    }

    .btn-editar:hover {
        background-color: #d4ac0d;
    }

    .btn-eliminar {
        background-color: #e74c3c;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: white;
    }

    .btn-eliminar:hover {
        background-color: #c0392b;
    }
</style>

<div class="container-fluid">

    <h2 class="titulo-seccion">Gestión de Usuarios</h2>

    <button class="btn-nuevo">+ Nuevo Usuario</button>

    <div class="card">

        <div class="tabla-usuarios">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Ana López</td>
                        <td>alopez</td>
                        <td>Administrador</td>
                        <td><span class="badge-activo">Activo</span></td>
                        <td>
                            <button class="btn-editar">Editar</button>
                            <button class="btn-eliminar">Desactivar</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

{% endblock %}
