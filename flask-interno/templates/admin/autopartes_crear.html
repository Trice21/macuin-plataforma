{% extends "layout.html" %}

{% block title %}Agregar Nueva Autoparte — MACUIN{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="m-0" style="font-weight: 700; color: var(--primary);">Agregar Nueva Autoparte</h2>
            <p class="text-secondary m-0">Completa los datos para registrar un nuevo producto en el catálogo.</p>
        </div>
        <a href="{{ url_for('admin_autopartes') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Volver al Catálogo
        </a>
    </div>

    <div class="card border-0 shadow-sm p-4">
        <form action="{{ url_for('admin_autopartes') }}" method="GET" class="row g-4">
            <div class="col-md-6">
                <label class="form-label fw-bold">Nombre de la Autoparte</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-cog text-secondary"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" placeholder="Ej. Amortiguador Delantero">
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Categoría</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-tags text-secondary"></i></span>
                    <select class="form-select border-start-0 ps-0">
                        <option selected disabled>Selecciona una categoría</option>
                        <option>Motor</option>
                        <option>Suspensión</option>
                        <option>Frenos</option>
                        <option>Transmisión</option>
                        <option>Eléctrico</option>
                    </select>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Marca</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-industry text-secondary"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" placeholder="Ej. Bosch, Monroe, Gabriel">
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Precio de Venta ($)</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-dollar-sign text-secondary"></i></span>
                    <input type="number" step="0.01" class="form-control border-start-0 ps-0" placeholder="0.00">
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Stock Inicial</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-cubes text-secondary"></i></span>
                    <input type="number" class="form-control border-start-0 ps-0" placeholder="0">
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Ubicación en Almacén</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fas fa-map-marker-alt text-secondary"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" placeholder="Ej. Estante A-12">
                </div>
            </div>

            <div class="col-12 mt-5">
                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-primary px-5 py-2 shadow-sm" style="background-color: var(--primary); border: none;">
                        <i class="fas fa-save me-2"></i> Guardar Autoparte
                    </button>
                    <button type="reset" class="btn btn-light px-4 py-2">
                        Limpiar Formulario
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
