{% extends "layout.html" %}

{% block content %}

<style>
    .titulo-seccion {
        font-weight: 700;
        margin-bottom: 10px;
        color: #2c3e50;
    }

    .separador-titulo {
        border: none;
        height: 1px;
        background-color: var(--accent);
        margin-bottom: 25px;
    }

    .btn-agregar {
        background-color: #f1c40f;
        color: #000;
        font-weight: 600;
        border-radius: 8px;
        padding: 8px 18px;
        border: none;
        transition: 0.3s;
    }

    .btn-agregar:hover {
        background-color: #d4ac0d;
    }

    .tabla-autopartes table {
        width: 100%;
        border-collapse: collapse;
    }

    .tabla-autopartes thead {
        background-color: #1F3A5F;
        color: #fff;
    }

    .tabla-autopartes th,
    .tabla-autopartes td {
        padding: 14px;
        font-size: 14px;
        vertical-align: middle;
        border-bottom: 1px solid var(--accent);
        border-right: 1px solid #ffffff30;
    }

    .tabla-autopartes th:last-child,
    .tabla-autopartes td:last-child {
        border-right: none;
    }

    .tabla-autopartes th {
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .tabla-autopartes tbody tr:hover {
        background-color: #f8f9fa;
        transition: 0.2s;
    }

    .btn-editar {
        background-color: #f1c40f;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: #000;
        margin-right: 6px;
    }

    .btn-editar:hover {
        background-color: #d4ac0d;
    }

    .btn-eliminar {
        background-color: #e74c3c;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        color: #fff;
    }

    .btn-eliminar:hover {
        background-color: #c0392b;
    }

    .badge-stock {
        padding: 6px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
    }

    .stock-ok {
        background-color: #2ecc71;
        color: #fff;
    }

    .stock-bajo {
        background-color: #f39c12;
        color: #fff;
    }
</style>

<div class="container-fluid">

    <h2 class="titulo-seccion">Gestión de Autopartes</h2>
    <hr class="separador-titulo">

    <div style="text-align: right; margin-bottom: 20px;">
        <button class="btn-agregar">+ Agregar Nueva Autoparte</button>
    </div>

    <div class="card">

        <div class="tabla-autopartes">
            <table class="table mb-0 text-center">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Marca</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td><strong>Filtro de Aceite</strong></td>
                        <td>Motor</td>
                        <td>Bosch</td>
                        <td>$250</td>
                        <td>
                            <span class="badge-stock stock-ok">Disponible</span>
                        </td>
                        <td>
                            <button class="btn-editar">Editar</button>
                            <button class="btn-eliminar">Eliminar</button>
                        </td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td><strong>Bujía NGK</strong></td>
                        <td>Encendido</td>
                        <td>NGK</td>
                        <td>$120</td>
                        <td>
                            <span class="badge-stock stock-bajo">Bajo Stock</span>
                        </td>
                        <td>
                            <button class="btn-editar">Editar</button>
                            <button class="btn-eliminar">Eliminar</button>
                        </td>
                    </tr>
                </tbody>

            </table>
        </div>

    </div>

</div>

{% endblock %}
